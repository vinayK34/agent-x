services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/agentx.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0)"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build: ./frontend
    environment:
      # Browser → host-mapped port
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Next.js server-side proxy → in-network service name
      - API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

